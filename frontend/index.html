<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRM Full Stack Challenge</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page">
        <header class="hero">
            <h1>SRM Full Stack Challenge</h1>
            <p>
                Enter one edge per line, or paste a JSON body like
                <code>{"data":["A->B","A->C"]}</code>
            </p>
        </header>

        <main class="grid">
            <section class="panel input-panel">
                <div class="panel-header">
                    <h2>Input</h2>
                    <button id="sampleBtn" class="secondary-btn" type="button">Load Sample</button>
                </div>

                <textarea id="inputData" rows="14" placeholder="A->B&#10;A->C&#10;B->D&#10;C->E&#10;E->F"></textarea>

                <div class="actions">
                    <button id="submitBtn" class="primary-btn" type="button">Submit</button>
                    <button id="clearBtn" class="secondary-btn" type="button">Clear</button>
                </div>

                <div id="errorBox" class="error hidden"></div>
            </section>

            <section class="panel output-panel">
                <div class="panel-header">
                    <h2>Output</h2>
                </div>

                <div id="result" class="result">
                    <div class="empty-state">
                        Submit some input to see the structured API response here.
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
